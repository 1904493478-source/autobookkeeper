<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="自动记账">
<link rel="manifest" href="manifest.json">
<title>自动记账</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#F0F6FC;--card:#FFF;--primary:#3B82F6;--primary-light:#DBEAFE;--text:#1E293B;
  --text2:#64748B;--income:#22C55E;--income-bg:#F0FDF4;--expense:#EF4444;--expense-bg:#FEF2F2;
  --divider:#E2E8F0;--radius:16px;--radius-sm:12px;--shadow:0 2px 8px rgba(0,0,0,.04);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);-webkit-user-select:none;user-select:none;padding-bottom:80px}
.toolbar{position:sticky;top:0;z-index:10;background:var(--bg);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.toolbar h1{font-size:22px;font-weight:600}
.card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin:0 16px 12px}
.card-title{font-size:14px;font-weight:500;color:var(--text2);margin-bottom:8px}
.amount{font-size:32px;font-weight:700}
.amount-sm{font-size:24px;font-weight:700}
.month-select{display:flex;align-items:center;gap:12px}
.month-select button{width:44px;height:44px;border:none;background:0;color:var(--primary);font-size:18px;cursor:pointer;border-radius:50%}
.month-select button:active{background:var(--primary-light)}
.month-select span{font-size:17px;font-weight:600;min-width:90px;text-align:center}
.summary-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px;margin-bottom:12px}
.summary-card{padding:16px;border-radius:var(--radius)}
.summary-card .label{font-size:14px;font-weight:500;margin-bottom:8px}
.summary-card .val{font-size:24px;font-weight:700}
.chart-wrap{height:220px;display:flex;justify-content:center}
.txn-section{margin:12px 16px}
.txn-section h3{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;display:flex;justify-content:space-between}
.txn-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--divider);position:relative;overflow:hidden}
.txn-row:last-child{border-bottom:none}
.txn-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.txn-info{flex:1;min-width:0}
.txn-info .merchant{font-size:16px;line-height:1.4}
.txn-info .meta{font-size:13px;color:var(--text2)}
.txn-amount{font-size:16px;font-weight:500;white-space:nowrap}
.income-text{color:var(--income)}.expense-text{color:var(--expense)}
.search-bar{position:sticky;top:56px;z-index:5;padding:0 16px 8px;background:var(--bg)}
.search-bar input{width:100%;padding:10px 16px;border:none;border-radius:10px;background:#E8EDF4;font-size:16px;outline:none}
.search-bar input:focus{background:var(--card);box-shadow:0 0 0 2px var(--primary-light)}
.empty{text-align:center;padding:60px 16px;color:var(--text2)}
.empty .icon{font-size:48px;margin-bottom:12px}
.empty p{font-size:17px;font-weight:600;color:var(--text);margin-bottom:4px}
.empty span{font-size:13px}
.delete-zone{position:absolute;right:0;top:0;bottom:0;width:80px;background:var(--expense);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.txn-inner{width:100%;transition:transform .2s}
.preset-tag{font-size:10px;color:var(--text2);background:var(--divider);padding:2px 8px;border-radius:10px}
.section-header{font-size:13px;font-weight:600;color:var(--text2);padding:0 16px 8px;text-transform:uppercase;letter-spacing:.5px}
.list-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--divider)}
.list-item:last-child{border-bottom:none}
.list-item .icon-circle{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:var(--primary-light);color:var(--primary)}
.list-item .info{flex:1;font-size:16px}
.list-item .arrow{color:var(--text2);font-size:14px}
.guide-steps{padding:4px 0}
.guide-step{display:flex;gap:8px;margin-bottom:8px;font-size:13px;color:var(--text2);align-items:flex-start}
.guide-step .num{font-weight:600;color:var(--primary);min-width:18px}
.bottom-tabs{position:fixed;bottom:0;left:0;right:0;background:var(--card);display:flex;border-top:1px solid var(--divider);padding-bottom:env(safe-area-inset-bottom);z-index:20}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:6px 0 4px;font-size:10px;color:var(--text2);cursor:pointer;border:none;background:0}
.tab.active{color:var(--primary)}
.tab .tab-icon{font-size:22px;margin-bottom:2px}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:100;transition:opacity .3s;pointer-events:none}
.toast.hidden{opacity:0}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:50;display:flex;align-items:flex-end}
.modal-sheet{background:var(--card);width:100%;border-radius:20px 20px 0 0;padding:24px 16px;max-height:80vh;overflow-y:auto}
.modal-sheet h3{font-size:18px;font-weight:600;margin-bottom:16px}
.modal-sheet .btn-row{display:flex;gap:12px;margin-top:16px}
.btn{flex:1;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer}
.btn-primary{background:var(--primary);color:#FFF}
.btn-cancel{background:var(--divider);color:var(--text)}
.btn-danger{background:var(--expense);color:#FFF}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:4px}
.form-group input,.form-group select{width:100%;padding:12px;border:1px solid var(--divider);border-radius:10px;font-size:16px;outline:none;background:var(--bg)}
.form-group input:focus{border-color:var(--primary)}
.segmented{display:flex;background:var(--divider);border-radius:10px;overflow:hidden}
.segmented button{flex:1;padding:10px;border:none;font-size:15px;font-weight:500;cursor:pointer;background:0;color:var(--text2)}
.segmented button.active{background:var(--primary);color:#FFF;border-radius:10px}
.icon-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.icon-grid button{width:100%;aspect-ratio:1;border:2px solid transparent;border-radius:12px;background:var(--bg);font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.icon-grid button.selected{border-color:var(--primary);background:var(--primary-light)}
</style>
</head>
<body>

<div class="toolbar"><h1 id="pageTitle">月度总览</h1></div>

<!-- Toast -->
<div id="toast" class="toast hidden"></div>

<!-- Tab 1: Summary -->
<div id="tab-summary">
  <div class="month-select" style="padding:0 16px 12px">
    <button onclick="changeMonth(-1)">‹</button>
    <span id="monthTitle"></span>
    <button onclick="changeMonth(1)">›</button>
  </div>
  <div class="summary-row">
    <div class="summary-card" style="background:var(--income-bg)">
      <div class="label" style="color:var(--income)">收入</div>
      <div class="val income-text" id="sumIncome">¥0.00</div>
    </div>
    <div class="summary-card" style="background:var(--expense-bg)">
      <div class="label" style="color:var(--expense)">支出</div>
      <div class="val expense-text" id="sumExpense">¥0.00</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">支出分类占比</div>
    <div class="chart-wrap"><canvas id="pieChart"></canvas></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px">
      <span style="font-size:14px;font-weight:500;color:var(--text2)">当月结余</span>
      <span class="amount-sm" id="sumBalance" style="color:var(--income)">¥0.00</span>
    </div>
  </div>
  <div class="card" id="top3Card" style="display:none">
    <div class="card-title">支出 Top 3</div>
    <div id="top3List"></div>
  </div>
  <div class="empty" id="emptySummary" style="display:none">
    <div class="icon">📋</div>
    <p>暂无交易记录</p>
    <span>支付后双击手机背面即可自动记账</span>
  </div>
</div>

<!-- Tab 2: Transactions -->
<div id="tab-transactions" style="display:none">
  <div class="search-bar"><input type="search" id="searchInput" placeholder="搜索商户、分类、备注" oninput="renderTransactions()"></div>
  <div id="txnList"></div>
  <div class="empty" id="emptyTxn" style="display:none">
    <div class="icon">📋</div>
    <p>暂无交易记录</p>
    <span>支付后双击手机背面即可自动记账</span>
  </div>
</div>

<!-- Tab 3: Settings -->
<div id="tab-settings" style="display:none">
  <div style="padding:12px 16px"><span class="section-header">数据</span></div>
  <div class="list-item" onclick="showModal('categoryModal')">
    <div class="icon-circle">📂</div><div class="info">分类管理</div><div class="arrow">›</div>
  </div>
  <div style="padding:12px 16px;margin-top:12px"><span class="section-header">快捷指令</span></div>
  <div class="card"><div class="guide-steps">
    <div class="guide-step"><span class="num">1.</span>打开「快捷指令」App，导入自动记账快捷指令</div>
    <div class="guide-step"><span class="num">2.</span>iPhone 设置 → 辅助功能 → 触控</div>
    <div class="guide-step"><span class="num">3.</span>滑到底部 → 轻点背面 → 轻点两下</div>
    <div class="guide-step"><span class="num">4.</span>选择「自动记账」快捷指令</div>
  </div></div>
  <div style="padding:12px 16px;margin-top:12px"><span class="section-header">关于</span></div>
  <div class="list-item"><div class="info">版本</div><div style="color:var(--text2);font-size:14px">1.0.0</div></div>
  <div class="list-item"><div class="info">最低系统</div><div style="color:var(--text2);font-size:14px">iOS 16.4+</div></div>
</div>

<!-- Tab Bar -->
<div class="bottom-tabs">
  <button class="tab active" onclick="switchTab(0)" id="tabBtn0"><span class="tab-icon">📊</span>总览</button>
  <button class="tab" onclick="switchTab(1)" id="tabBtn1"><span class="tab-icon">📋</span>明细</button>
  <button class="tab" onclick="switchTab(2)" id="tabBtn2"><span class="tab-icon">⚙️</span>设置</button>
</div>

<!-- Category Modal -->
<div class="modal-overlay" id="categoryModal" style="display:none" onclick="if(event.target===this)hideModal('categoryModal')">
  <div class="modal-sheet">
    <h3>分类管理</h3>
    <div id="categoryList"></div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="showAddCategory()">+ 添加分类</button>
    </div>
    <div class="btn-row"><button class="btn btn-cancel" onclick="hideModal('categoryModal')">关闭</button></div>
  </div>
</div>

<!-- Add Category Modal -->
<div class="modal-overlay" id="addCatModal" style="display:none" onclick="if(event.target===this)hideModal('addCatModal')">
  <div class="modal-sheet">
    <h3>添加分类</h3>
    <div class="form-group"><label>名称</label><input id="newCatName" placeholder="分类名称"></div>
    <div class="form-group"><label>类型</label>
      <div class="segmented">
        <button class="active" data-type="expense" onclick="selCatType(this,'expense')">支出</button>
        <button data-type="income" onclick="selCatType(this,'income')">收入</button>
      </div>
    </div>
    <div class="form-group"><label>图标</label>
      <div class="icon-grid" id="iconGrid"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveCategory()">保存</button>
      <button class="btn btn-cancel" onclick="hideModal('addCatModal')">取消</button>
    </div>
  </div>
</div>

<script>
// === IndexedDB ===
const DB_NAME='AutoBookkeeper';
let db;
function openDB(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open(DB_NAME,1);
    req.onupgradeneeded=(e)=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('transactions')){
        const s=d.createObjectStore('transactions',{keyPath:'id'});
        s.createIndex('date','date');
        s.createIndex('type','type');
      }
      if(!d.objectStoreNames.contains('categories')){
        const s=d.createObjectStore('categories',{keyPath:'id'});
        s.createIndex('sortOrder','sortOrder');
      }
    };
    req.onsuccess=(e)=>{db=e.target.result;resolve(db)};
    req.onerror=()=>reject(req.error);
  });
}
function txStore(mode='readonly'){return db.transaction('transactions',mode).objectStore('transactions')}
function catStore(mode='readonly'){return db.transaction('categories',mode).objectStore('categories')}

// === Categories ===
const PRESET_EXPENSE=[
  {name:'餐饮',icon:'🍽️'},{name:'交通',icon:'🚗'},{name:'购物',icon:'🛒'},{name:'娱乐',icon:'🎮'},
  {name:'住房',icon:'🏠'},{name:'通讯',icon:'📡'},{name:'医疗',icon:'💊'},{name:'数码',icon:'💻'},{name:'其他',icon:'📦'}
];
const PRESET_INCOME=[
  {name:'工资',icon:'💰'},{name:'兼职',icon:'💼'},{name:'理财',icon:'📈'},{name:'退款',icon:'↩️'},{name:'其他',icon:'📦'}
];
const CAT_ICONS=['🍽️','🚗','🛒','🎮','🏠','📡','💊','💻','💰','💼','📈','🎁','📱','🎬','🎵','🐾','🌿','🎓','✈️','🔧','👕','🛍️','💄','📚'];

async function seedCategories(){
  const store=catStore('readonly');
  const all=await new Promise(r=>{const req=store.getAll();req.onsuccess=()=>r(req.result)});
  if(all.length>0) return;
  const tx=catStore('readwrite');
  let order=0;
  for(const c of PRESET_EXPENSE){tx.add({id:crypto.randomUUID(),name:c.name,icon:c.icon,type:'expense',isPreset:true,sortOrder:order++})}
  for(const c of PRESET_INCOME){tx.add({id:crypto.randomUUID(),name:c.name,icon:c.icon,type:'income',isPreset:true,sortOrder:order++})}
  await new Promise(r=>{tx.transaction.oncomplete=r});
}
async function getCategories(){
  const all=await new Promise(r=>{const req=catStore().getAll();req.onsuccess=()=>r(req.result)});
  return all.sort((a,b)=>a.sortOrder-b.sortOrder);
}

// === State ===
let currentTab=0;
let displayedMonth=new Date();
let transactions=[];
let categories=[];
let searchText='';

function monthKey(d){const dt=new Date(d);return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`}
function currentMonthKey(){return monthKey(displayedMonth)}

async function loadData(){
  categories=await getCategories();
  const all=await new Promise(r=>{const req=txStore().getAll();req.onsuccess=()=>r(req.result)});
  transactions=all.sort((a,b)=>new Date(b.date)-new Date(a.date));
}

// === URL Parse ===
async function handleURL(){
  const params=new URLSearchParams(window.location.search);
  const ocr=params.get('ocr');
  if(!ocr) return;
  const decoded=decodeURIComponent(ocr);
  const amount=extractAmount(decoded);
  if(!amount){showToast('无法识别金额，请手动记账');return}
  const type=decoded.includes('收款')||decoded.includes('入账')?'income':'expense';
  const merchant=extractMerchant(decoded);
  const method=decoded.includes('微信')?'wechat':decoded.includes('支付宝')?'alipay':'other';
  const store=txStore('readwrite');
  const txn={id:crypto.randomUUID(),amount,type,merchant,note:'',method,date:new Date().toISOString(),createdAt:new Date().toISOString()};
  store.add(txn);
  await new Promise(r=>{store.transaction.oncomplete=r});
  await loadData();
  const label=type==='income'?'收入':'支出';
  showToast(`已记账 · ${label} ¥${amount.toFixed(2)}`);
  showLocalNotification(label,amount);
  renderAll();
}
function extractAmount(text){
  const patterns=[/¥\s*(\d+\.?\d{0,2})/,/￥\s*(\d+\.?\d{0,2})/,/(\d+\.\d{2})/];
  for(const p of patterns){const m=text.match(p);if(m&&parseFloat(m[1])>0)return parseFloat(m[1])}
  return 0;
}
function extractMerchant(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l&&l.length>=2&&l.length<=20);
  const skip=['支付','收','¥','￥','元','微信','支付宝','成功','付款','收款','当前','状态','零钱'];
  for(const l of lines.slice(0,5)){if(!skip.some(w=>l.includes(w)))return l}
  return lines[0]||'';
}
function showLocalNotification(type,amount){
  if(!('Notification' in window)||Notification.permission!=='granted')return;
  const sign=type==='income'?'+':'-';
  new Notification('已记账',{body:`${type==='income'?'收入':'支出'} ${sign}¥${amount.toFixed(2)}`,icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%233B82F6"/></svg>'});
}

// === Render ===
function renderAll(){
  renderSummary();
  renderTransactions();
  renderCategoryList();
}
function renderSummary(){
  const key=currentMonthKey();
  const monthTxns=transactions.filter(t=>monthKey(t.date)===key);
  const income=monthTxns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense=monthTxns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  document.getElementById('sumIncome').textContent=`¥${income.toFixed(2)}`;
  document.getElementById('sumExpense').textContent=`¥${expense.toFixed(2)}`;
  const bal=income-expense;
  const balEl=document.getElementById('sumBalance');
  balEl.textContent=`¥${Math.abs(bal).toFixed(2)}`;
  balEl.style.color=bal>=0?'var(--income)':'var(--expense)';
  // Chart
  const catMap={};
  for(const t of monthTxns.filter(t=>t.type==='expense')){
    const cat=categories.find(c=>c.id===t.categoryId)||{name:'未分类',icon:'📦'};
    const k=cat.name;
    catMap[k]=catMap[k]||{name:cat.name,amount:0,icon:cat.icon};
    catMap[k].amount+=t.amount;
  }
  const chartData=Object.values(catMap).sort((a,b)=>b.amount-a.amount);
  const colors=['#F97316','#3B82F6','#8B5CF6','#EC4899','#14B8A6','#6366F1','#EF4444','#0EA5E9','#94A3B8'];
  if(window.pieChartInstance)window.pieChartInstance.destroy();
  if(chartData.length>0){
    document.getElementById('pieChart').parentElement.style.display='';
    window.pieChartInstance=new Chart(document.getElementById('pieChart'),{
      type:'doughnut',
      data:{labels:chartData.map(d=>d.name),datasets:[{data:chartData.map(d=>d.amount),backgroundColor:colors.slice(0,chartData.length),borderWidth:0}]},
      options:{plugins:{legend:{display:false}},cutout:'58%',responsive:true,maintainAspectRatio:false}
    });
  }
  // Top 3
  const top3=chartData.slice(0,3);
  const tc=document.getElementById('top3Card');
  if(top3.length>0){
    tc.style.display='';
    document.getElementById('top3List').innerHTML=top3.map((d,i)=>`<div style="display:flex;align-items:center;gap:12px;padding:8px 0"><span style="font-size:14px;font-weight:700;color:var(--text2);width:20px">${i+1}</span><span style="font-size:20px;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:${colors[i]}20">${d.icon}</span><span style="font-size:16px;flex:1">${d.name}</span><span style="font-size:16px;color:var(--expense)">¥${d.amount.toFixed(2)}</span></div>`).join('');
  }else{tc.style.display='none'}
  document.getElementById('emptySummary').style.display=monthTxns.length===0?'':'none';
}
function renderTransactions(){
  const list=document.getElementById('txnList');
  const empty=document.getElementById('emptyTxn');
  let filtered=transactions;
  if(searchText){const s=searchText.toLowerCase();filtered=filtered.filter(t=>t.merchant.toLowerCase().includes(s)||(t.note||'').toLowerCase().includes(s))}
  if(filtered.length===0){
    list.innerHTML='';empty.style.display='';
    if(searchText){empty.querySelector('p').textContent='未找到匹配记录'}
    else{empty.querySelector('p').textContent='暂无交易记录'}
    return;
  }
  empty.style.display='none';
  // Group by day
  const groups={};
  for(const t of filtered){
    const d=new Date(t.date).toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'short'});
    groups[d]=groups[d]||[];
    groups[d].push(t);
  }
  let html='';
  for(const [day,txns] of Object.entries(groups)){
    const total=txns.reduce((s,t)=>s+(t.type==='income'?t.amount:-t.amount),0);
    const totalColor=total>=0?'var(--income)':'var(--expense)';
    html+=`<div class="txn-section"><h3><span>${day}</span><span style="font-size:13px"><span style="font-size:11px;color:var(--text2)">${txns.length}笔 </span><span style="color:${totalColor}">${total>=0?'+':''}¥${Math.abs(total).toFixed(2)}</span></span></h3>`;
    for(const t of txns){
      const cat=categories.find(c=>c.id===t.categoryId)||{name:'未分类',icon:'📦'};
      const time=new Date(t.date).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
      const amtSign=t.type==='income'?'+':'-';
      const amtClass=t.type==='income'?'income-text':'expense-text';
      const merchant=t.merchant||cat.name;
      html+=`<div class="txn-row" data-id="${t.id}">
        <div class="txn-inner" style="display:flex;align-items:center;gap:12px;width:100%" onclick="editTransaction('${t.id}')">
          <div class="txn-icon" style="background:var(--primary-light);color:var(--primary)">${cat.icon}</div>
          <div class="txn-info"><div class="merchant">${escHtml(merchant)}</div><div class="meta">${cat.name} · ${time}</div></div>
          <div class="txn-amount ${amtClass}">${amtSign}¥${t.amount.toFixed(2)}</div>
        </div></div>`;
    }
    html+='</div>';
  }
  list.innerHTML=html;
  // Swipe delete
  let touchStart=0;
  document.querySelectorAll('.txn-row').forEach(row=>{
    row.addEventListener('touchstart',e=>{touchStart=e.touches[0].clientX});
    row.addEventListener('touchend',e=>{
      const dx=e.changedTouches[0].clientX-touchStart;
      const inner=row.querySelector('.txn-inner');
      if(dx<-60){inner.style.transform='translateX(-80px)'}
      else{inner.style.transform='translateX(0)'}
      if(dx<-120)deleteTransaction(row.dataset.id);
    });
  });
}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
async function deleteTransaction(id){
  if(!confirm('确认删除此交易？'))return;
  const store=txStore('readwrite');store.delete(id);
  await new Promise(r=>{store.transaction.oncomplete=r});
  await loadData();renderAll();
}
function editTransaction(id){
  const t=transactions.find(x=>x.id===id);
  if(!t)return;
  // Simple edit via prompt for amount and merchant
  const newAmt=prompt('金额',t.amount);
  if(newAmt===null)return;
  const newMerchant=prompt('商户',t.merchant||'');
  if(newMerchant===null)return;
  const amt=parseFloat(newAmt);
  if(isNaN(amt)||amt<=0)return;
  const store=txStore('readwrite');
  const req=store.get(id);
  req.onsuccess=()=>{
    const r=req.result;
    r.amount=amt;r.merchant=newMerchant;
    store.put(r);
    store.transaction.oncomplete=async()=>{await loadData();renderAll()};
  };
}

// === Month ===
function changeMonth(delta){
  displayedMonth=new Date(displayedMonth.getFullYear(),displayedMonth.getMonth()+delta,1);
  updateMonthTitle();
  renderSummary();
}
function updateMonthTitle(){
  document.getElementById('monthTitle').textContent=displayedMonth.toLocaleDateString('zh-CN',{year:'numeric',month:'long'});
}

// === Tabs ===
function switchTab(idx){
  currentTab=idx;
  ['tab-summary','tab-transactions','tab-settings'].forEach((id,i)=>document.getElementById(id).style.display=i===idx?'':'none');
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById(`tabBtn${idx}`).classList.add('active');
  document.getElementById('pageTitle').textContent=['月度总览','收支明细','设置'][idx];
  if(idx===0){updateMonthTitle();renderSummary()}
  if(idx===1)renderTransactions();
  if(idx===2)renderCategoryList();
}

// === Toast ===
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.remove('hidden');
  setTimeout(()=>t.classList.add('hidden'),2000);
}

// === Modals ===
function showModal(id){document.getElementById(id).style.display='flex'}
function hideModal(id){document.getElementById(id).style.display='none'}

// === Category Management ===
let catType='expense',catIcon='🍽️';
function renderCategoryList(){
  const expense=categories.filter(c=>c.type==='expense');
  const income=categories.filter(c=>c.type==='income');
  let html='';
  [['支出分类',expense],['收入分类',income]].forEach(([title,list])=>{
    html+=`<div style="font-size:13px;font-weight:600;color:var(--text2);margin:12px 0 4px">${title}</div>`;
    for(const c of list){
      html+=`<div class="list-item">
        <div class="icon-circle">${c.icon}</div><div class="info">${c.name}</div>
        ${c.isPreset?'<span class="preset-tag">预设</span>':
        `<button style="background:0;border:none;color:var(--expense);font-size:14px;cursor:pointer;padding:4px 8px" onclick="deleteCategory('${c.id}')">删除</button>`}
      </div>`;
    }
  });
  document.getElementById('categoryList').innerHTML=html;
}
function showAddCategory(){
  catType='expense';catIcon='🍽️';
  document.querySelectorAll('#addCatModal .segmented button').forEach(b=>b.classList.toggle('active',b.dataset.type===catType));
  document.getElementById('newCatName').value='';
  renderIconGrid();
  hideModal('categoryModal');
  showModal('addCatModal');
}
function selCatType(btn,type){catType=type;document.querySelectorAll('#addCatModal .segmented button').forEach(b=>b.classList.toggle('active',b.dataset.type===type))}
function renderIconGrid(){
  document.getElementById('iconGrid').innerHTML=CAT_ICONS.map(i=>`<button class="${i===catIcon?'selected':''}" onclick="catIcon='${i}';renderIconGrid()">${i}</button>`).join('');
}
async function saveCategory(){
  const name=document.getElementById('newCatName').value.trim();
  if(!name)return;
  const store=catStore('readwrite');
  const maxOrder=categories.filter(c=>c.type===catType).reduce((m,c)=>Math.max(m,c.sortOrder),-1);
  store.add({id:crypto.randomUUID(),name,icon:catIcon,type:catType,isPreset:false,sortOrder:maxOrder+1});
  await new Promise(r=>{store.transaction.oncomplete=r});
  categories=await getCategories();
  renderCategoryList();
  hideModal('addCatModal');
  showModal('categoryModal');
}
async function deleteCategory(id){
  if(!confirm('删除此分类？'))return;
  const store=catStore('readwrite');store.delete(id);
  await new Promise(r=>{store.transaction.oncomplete=r});
  categories=await getCategories();
  renderCategoryList();
}

// === Init ===
async function init(){
  await openDB();
  await seedCategories();
  await loadData();
  updateMonthTitle();
  renderSummary();
  // Notification permission
  if('Notification' in window&&Notification.permission==='default'){
    Notification.requestPermission();
  }
  // Service worker
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js');
  }
  await handleURL();
}
init();
</script>
